name: CI - Kubernetes Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Run Tests with Coverage
        run: |
          cd ./MyService
          chmod +x gradlew
          ./gradlew test jacocoTestReport

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./MyService/build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
          
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle
          
      - name: Build and analyze
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}     
        run: |
          cd ./MyService
          chmod +x gradlew
          ./gradlew build sonar --info     

      - name: Build Docker images
        run: |
          cd ./MyService
          docker build -t jules77940/betfeminist:latest .

      # --- ÉTAPES KUBERNETES ---

      - name: Start Minikube
        uses: medyagh/setup-minikube@latest
        
      - name: Deploy to Kubernetes
        run: |
          # On applique le fichier de configuration
          kubectl apply -f k8s-deployment.yml
          
          # On laisse 20 secondes à Kubernetes pour démarrer le pod
          sleep 20
          
          # On affiche l'état pour vérifier que c'est Running
          kubectl get pods
          kubectl get services

      - name: Test Port-Forward
        run: |
          # On ouvre le pont réseau en arrière-plan comme tu l'as demandé
          kubectl port-forward --address 0.0.0.0 service/betfeminist-service 4002:8080 &
          
          # On attend 5 secondes pour que le pont soit bien ouvert
          sleep 5
          
          # On teste l'accès localement pour valider le pipeline
          curl http://localhost:4002
